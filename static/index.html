<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent v2.0 - 工业级记忆演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .chat-scroll::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        .message-bubble { max-width: 80%; word-wrap: break-word; }
        .thought-process { font-family: 'Fira Code', monospace; font-size: 0.85rem; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex overflow-hidden font-sans text-slate-900">

    <!-- 左侧：主聊天区域 -->
    <main class="flex-1 flex flex-col h-full relative">
        <!-- 顶部状态栏 -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <h1 class="font-bold text-lg text-slate-700">AI Agent v2.0 <span class="text-sm font-normal text-slate-400 ml-2">Engineered Edition</span></h1>
            </div>
            <button onclick="clearMemory()" class="text-sm px-3 py-1 bg-slate-100 hover:bg-red-50 hover:text-red-600 text-slate-500 rounded transition-colors border border-slate-200">
                清空所有记忆
            </button>
        </header>

        <!-- 聊天内容区 -->
        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6 chat-scroll">
            <!-- 初始欢迎语 -->
            <div class="flex justify-start">
                <div class="message-bubble bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none shadow-sm">
                    你好！我是 v2.0 Agent。我已经加载了分级记忆系统和统一向量存储。你可以尝试告诉我一些个人信息，或者让我查询知识库。
                </div>
            </div>
        </div>

        <!-- 输入区 -->
        <div class="p-4 bg-white border-t border-slate-200">
            <div class="max-w-4xl mx-auto flex gap-3">
                <input type="text" id="user-input"
                       placeholder="输入消息..."
                       class="flex-1 p-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                       onkeydown="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()"
                        class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium transition-all shadow-md active:scale-95">
                    发送
                </button>
            </div>
        </div>
    </main>

    <!-- 右侧：内存监控面板 -->
    <aside class="w-80 bg-slate-100 border-l border-slate-200 flex flex-col h-full p-6 space-y-8 overflow-y-auto">
        <section>
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">记忆层级状态</h2>
            <div class="space-y-4">
                <!-- L0 状态 -->
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-slate-600">短期记忆 (L0)</span>
                        <span id="l0-count" class="text-xs font-bold bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">0/10</span>
                    </div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div id="l0-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <!-- L1 状态 -->
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-slate-600">阶段摘要 (L1)</span>
                        <span id="l1-count" class="text-xs font-bold bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full">0/10</span>
                    </div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div id="l1-bar" class="bg-indigo-500 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">全局核心共识 (L2)</h2>
            <div id="l2-content" class="bg-slate-200 p-3 rounded-xl text-sm text-slate-600 italic leading-relaxed border border-slate-300 min-h-[100px]">
                暂无全局共识...
            </div>
        </section>
    </aside>

    <script>
        const API_BASE = window.location.origin;

        async function updateStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();

                // 更新 L0
                document.getElementById('l0-count').innerText = `${data.l0_count}/${data.max_l0}`;
                document.getElementById('l0-bar').style.width = `${(data.l0_count / data.max_l0) * 100}%`;

                // 更新 L1
                document.getElementById('l1-count').innerText = `${data.l1_count}/${data.max_l1}`;
                document.getElementById('l1-bar').style.width = `${(data.l1_count / data.max_l1) * 100}%`;

                // 更新 L2
                document.getElementById('l2-content').innerText = data.l2_summary || "暂无全局共识...";
            } catch (e) {
                console.error("状态更新失败", e);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            // 添加用户消息
            appendMessage('user', text);

            // 添加 AI 思考占位符
            const aiDiv = appendMessage('ai', 'AI 正在思考...');
            const thoughtDiv = document.createElement('div');
            thoughtDiv.className = 'thought-process text-slate-400 text-xs mt-2 p-2 bg-slate-50 rounded border border-slate-100 hidden';
            aiDiv.appendChild(thoughtDiv);

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();

                // 渲染思考过程
                if (data.thought_process && data.thought_process.length > 1) {
                    thoughtDiv.innerHTML = data.thought_process.slice(0, -1).join('<br>→ ');
                    thoughtDiv.classList.remove('hidden');
                }

                // 更新最终回答
                aiDiv.querySelector('.message-bubble').innerText = data.answer;

                // 更新状态面板
                updateStatus();
            } catch (e) {
                aiDiv.querySelector('.message-bubble').innerText = "❌ 错误: 无法连接到服务器";
            }
        }

        function appendMessage(role, text) {
            const window = document.getElementById('chat-window');
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            const bubble = document.createElement('div');
            bubble.className = `message-bubble p-4 rounded-2xl shadow-sm ${
                role === 'user'
                ? 'bg-blue-600 text-white rounded-tr-none'
                : 'bg-white border border-slate-200 text-slate-800 rounded-tl-none'
            }`;
            bubble.innerText = text;

            const container = document.createElement('div');
            container.className = 'flex flex-col gap-2';
            container.appendChild(bubble);
            wrapper.appendChild(container);

            window.appendChild(wrapper);
            window.scrollTop = window.scrollHeight;
            return container;
        }

        async function clearMemory() {
            if (!confirm("确定要清空所有层级记忆吗？")) return;
            try {
                await fetch(`${API_BASE}/clear`, { method: 'POST' });
                location.reload();
            } catch (e) {
                alert("清空失败");
            }
        }

        // 初始化状态
        updateStatus();
    </script>
</body>
</html>
